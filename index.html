<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>サンプルHTML</title>
</head>
<body>

    <p>日々の呟き。</p>

    <table border="1">
        <tr>
            <th>日付</th>
            <th>呟き</th>
        </tr>
        <tr>
            <td>2026.06.13</td>
            <td>実験レポートにひとつひとつ、コメントを入れている。100枚以上あるが、意味があると信じて。</td>
        </tr>
    </table>

    <script>
  // 何日間「New」を表示するか設定（例：7日間）
  const displayDays = 7; 
  
  // 今日の日付を取得し、時間をリセット（0時0分0秒にする）
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // リストの各項目を取得して処理
  const listItems = document.querySelectorAll('#news-list li');

  listItems.forEach(item => {
    // data-date属性から更新日を取得
    const dateString = item.getAttribute('data-date');
    if (!dateString) return;

    const updateDate = new Date(dateString);
    updateDate.setHours(0, 0, 0, 0);

    // 日付の差分を計算（ミリ秒を日数に変換）
    const diffTime = today.getTime() - updateDate.getTime();
    const diffDays = diffTime / (1000 * 60 * 60 * 24);

    // 設定した日数以内なら「New」を表示
    if (diffDays <= displayDays && diffDays >= 0) {
      const badge = item.querySelector('.new-badge');
      if (badge) {
        badge.style.display = 'inline-block';
      }
    }
  });
</script>

</body>
</html>
